<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline · Family Quran Tracker</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f8fafc; color: #1e293b; display: grid; place-items: center; height: 100vh; margin: 0; text-align: center; }
        .box { max-width: 320px; padding: 2rem; }
        .icon { width: 72px; height: 72px; border-radius: 20px; background: #047857; color: #fff; display: grid; place-items: center; font-size: 2rem; margin: 0 auto 1rem; }
        h1 { font-size: 1.25rem; margin: 0 0 .5rem; }
        p { color: #64748b; font-size: .9rem; }
        button { margin-top: 1.25rem; background: #047857; color: #fff; border: 0; padding: .7rem 1.4rem; border-radius: 12px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">☪</div>
        <h1>You're offline</h1>
        <p>You can still read your Mushaf. Your logged sessions will sync once you're back online, in shaa Allah.</p>
        <button onclick="location.reload()">Try again</button>
    </div>
</body>
</html>
